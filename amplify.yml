# amplify.yml → place at the root (same level as client/ and server/)
version: 1

frontend:
  phases:
    preBuild:
      commands:
        # ────── Frontend (Next.js) ──────
        - cd client
        - nvm install 20
        - nvm use 20
        - npm ci --include=dev

    build:
      commands:
        # Copy any needed env vars or files from server if you want
        # (optional – only if your Next.js needs server-side secrets at build time)
        # - cp ../server/.env.local .env.production   # example

        - npm run build

  artifacts:
    # Next.js on Amplify Gen 2 in 2025 → always .next
    baseDirectory: client/.next
    files:
      - '**/*'

  cache:
    paths:
      - client/node_modules/**/*
      - client/.next/cache/**/*

# ────── Backend (server folder with database) ──────
# We keep it super simple: just install dependencies
# Amplify automatically deploys everything in server/ as Lambda + API Gateway
# if you ever run `amplify add api` or have amplify/backend/ inside server/
backend:
  phases:
    build:
      commands:
        # Start from repo root (important!)
        - cd server
        - npm ci
        # If you use Prisma → generate the client
        # - npx prisma generate
        # If you need migration at build time
        # - npx prisma migrate deploy

# Optional: nice branch previews
branches:
  main:
    stage: production
  '*':
    stage: development