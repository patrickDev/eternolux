# amplify.yml → place at the root (same level as client/ and server/)
version: 1

frontend:
  phases:
    preBuild:
      commands:
        # ────── Frontend (Next.js) ──────
        - cd client
        - nvm install 20
        - nvm use 20
        # ← Changed from npm ci → npm install (safe + auto-fixes lock file)
        - npm install --include=dev

    build:
      commands:
        - npm run build

  artifacts:
    baseDirectory: client/.next
    files:
      - '**/*'

  cache:
    paths:
      - client/node_modules/**/*
      - client/.next/cache/**/*

# ────── Backend (server folder) ──────
backend:
  phases:
    build:
      commands:
        - cd server
        # ← Changed from npm ci → npm install (this will never fail)
        - npm install
        # Optional Prisma commands (uncomment if you use Prisma)
        # - npx prisma generate
        # - npx prisma migrate deploy

# Branch previews
branches:
  main:
    stage: production
  '*':
    stage: development