app = "eternolux"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"

  [build.args]
    NEXT_PUBLIC_BACKEND_URL = "http://127.0.0.1:4000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpus = 1
  memory_mb = 1024
